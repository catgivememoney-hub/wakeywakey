<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Jefferson</title>
    <style>
        /* 全局样式：粉色系简约风格 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe5ec; /* 温暖的浅粉色 */
            font-family: 'Arial Rounded MT Bold', 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }

        /* 界面容器 */
        .container {
            text-align: center;
            transition: opacity 0.5s ease;
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }

        /* 第一页样式 */
        .page1 h1 {
            font-size: 3.5rem;
            color: #ff85a2; /* 深粉色文字 */
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .next-btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            background-color: #ffb3c6;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.3);
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            background-color: #ff85a2;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 133, 162, 0.5);
        }

        /* 第二页样式：动态文字效果 */
        .page2 h1 {
            font-size: 4rem;
            color: #ff477e;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            display: inline-block;
            /* 绑定复合动画：包含放大缩小、扭曲形状和规律位移 */
            animation: textCrazy 3s infinite ease-in-out;
        }

        /* 核心动画效果 */
        @keyframes textCrazy {
            0% {
                transform: scale(1) rotate(0deg) translateY(0px);
            }
            25% {
                transform: scale(1.3) rotate(5deg) translateY(-20px) skewX(-10deg);
                color: #ff7096;
            }
            50% {
                transform: scale(0.8) rotate(-5deg) translateY(0px) skewX(10deg);
                color: #ff0a54;
            }
            75% {
                transform: scale(1.4) rotate(3deg) translateY(20px) skewY(-5deg);
                color: #ff477e;
            }
            100% {
                transform: scale(1) rotate(0deg) translateY(0px);
            }
        }
    </style>
</head>
<body>

    <div id="page1" class="container page1">
        <h1>HEllO JEFFERSON</h1>
        <button class="next-btn" onclick="goToNextPage()">next</button>
    </div>

    <div id="page2" class="container page2 hidden">
        <h1>GET YOUR ASS UP！</h1>
    </div>

    <script>
        function goToNextPage() {
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            
            // 渐隐第一页
            page1.style.opacity = '0';
            
            setTimeout(() => {
                page1.classList.add('hidden');
                page2.classList.remove('hidden');
                // 渐显第二页
                page2.style.opacity = '0';
                setTimeout(() => {
                    page2.style.opacity = '1';
                }, 50);
            }, 500); // 等待半秒渐隐动画结束
        }
    </script>
</body>
</html>
