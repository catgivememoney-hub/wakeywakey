<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Jefferson</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe5ec;
            font-family: 'Impact', 'Arial Rounded MT Bold', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 界面容器 */
        .container {
            text-align: center;
            z-index: 9999; /* 确保第一页按钮在最上层 */
        }

        .hidden {
            display: none !important;
        }

        /* 第一页样式 */
        .page1 h1 {
            font-size: 3.5rem;
            color: #ff85a2;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .next-btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            background-color: #ffb3c6;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.3);
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            background-color: #ff85a2;
            transform: translateY(-3px);
        }

        /* 超极限全屏剧烈抖动 */
        .screen-shake {
            animation: superShake 0.05s infinite;
        }

        @keyframes superShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-15px, 15px) rotate(-2deg); }
            50% { transform: translate(15px, -15px) rotate(2deg); }
            75% { transform: translate(-15px, -15px) rotate(1.5deg); }
            100% { transform: translate(15px, 15px) rotate(-1.5deg); }
        }

        /* 乱窜文本样式 */
        .chaotic-text {
            position: absolute;
            font-weight: 900;
            white-space: nowrap;
            user-select: none;
            line-height: 0.8;
            pointer-events: none; /* 防止鼠标被卡死 */
            will-change: transform, left, top; /* 优化浏览器渲染性能防止卡顿 */
        }
    </style>
</head>
<body>

    <div id="page1" class="container page1">
        <h1>HEllO JEFFERSON</h1>
        <button class="next-btn" onclick="startExtremeChaos()">next</button>
    </div>

    <script>
        // 极致刺眼的色彩搭配
        const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a2', '#ff5c8a', '#ff0055', '#ff0000', '#d90429', '#mff007f'];

        function startExtremeChaos() {
            // 隐藏第一页
            const page1 = document.getElementById('page1');
            page1.classList.add('hidden');

            // 开启背景极速抖动
            document.body.classList.add('screen-shake');

            // 爆表数量：直接生成 120 个文本矩阵占满屏幕
            const textCount = 120; 
            for (let i = 0; i < textCount; i++) {
                createExtremeText();
            }
        }

        function createExtremeText() {
            const el = document.createElement('div');
            el.className = 'chaotic-text';
            el.innerText = 'GET YOUR ASS UP！';
            
            // 随机大小，大号字用来塞满屏幕
            const fontSize = Math.random() * (7 - 2) + 2; 
            el.style.fontSize = `${fontSize}rem`;
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            // 初始全屏幕随机散落
            let posX = Math.random() * window.innerWidth;
            let posY = Math.random() * window.innerHeight;
            el.style.left = `${posX}px`;
            el.style.top = `${posY}px`;

            document.body.appendChild(el);

            // 极限速度设置 (数值越大，速度越快)
            let speedX = (Math.random() - 0.5) * 60; 
            let speedY = (Math.random() - 0.5) * 60; 
            let scale = Math.random() * 2;
            let scaleDirection = Math.random() > 0.5 ? 0.15 : -0.15;
            let rotation = Math.random() * 360;
            let rotationSpeed = (Math.random() - 0.5) * 40; // 极速自转

            function animate() {
                posX += speedX;
                posY += speedY;
                scale += scaleDirection;
                rotation += rotationSpeed;

                // 碰到边界瞬间反弹
                if (posX < -300 || posX > window.innerWidth + 300) speedX *= -1;
                if (posY < -100 || posY > window.innerHeight + 100) speedY *= -1;

                // 极限缩放频率
                if (scale > 3.0 || scale < 0.3) scaleDirection *= -1;

                // 极高概率（每帧 10% 概率）发生没有任何规律的突然变向、变速，造成“乱窜”的视觉冲击
                if (Math.random() > 0.90) {
                    speedX = (Math.random() - 0.5) * 60;
                    speedY = (Math.random() - 0.5) * 60;
                }

                // 渲染位置与变形
                el.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
                el.style.left = `${posX}px`;
                el.style.top = `${posY}px`;

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);
        }

        // 屏幕尺寸改变自适应
        window.addEventListener('resize', () => {
            const elements = document.querySelectorAll('.chaotic-text');
            elements.forEach(el => {
                el.style.left = `${Math.random() * window.innerWidth}px`;
                el.style.top = `${Math.random() * window.innerHeight}px`;
            });
        });
    </script>
</body>
</html>
