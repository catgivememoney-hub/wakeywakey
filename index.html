<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Jefferson</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe5ec;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
            position: relative;
            transition: background 0.02s;
        }

        /* 界面容器 */
        .container {
            text-align: center;
            z-index: 99999; /* 确保第一页按钮不被遮挡 */
        }

        .hidden {
            display: none !important;
        }

        /* 第一页简约样式 */
        .page1 h1 {
            font-size: 3.5rem;
            color: #ff85a2;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .next-btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            background-color: #ffb3c6;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.3);
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            background-color: #ff85a2;
            transform: translateY(-3px);
        }

        /* 极速背景黑白闪烁动画（闪死人效果） */
        .crazy-flash {
            animation: flashBang 0.04s infinite alternate;
        }

        @keyframes flashBang {
            0% { background-color: #000000; }
            100% { background-color: #ffffff; }
        }

        /* 极限全屏剧烈抖动 */
        .screen-shake {
            animation: superShake 0.03s infinite;
        }

        @keyframes superShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-25px, 25px) rotate(-3deg); }
            50% { transform: translate(25px, -25px) rotate(3deg); }
            75% { transform: translate(-25px, -25px) rotate(2deg); }
            100% { transform: translate(25px, 25px) rotate(-2deg); }
        }

        /* 乱窜文本样式 */
        .chaotic-text {
            position: absolute;
            font-weight: 900;
            white-space: nowrap;
            user-select: none;
            line-height: 0.7;
            pointer-events: none;
            will-change: transform, left, top;
        }
    </style>
</head>
<body>

    <div id="page1" class="container page1">
        <h1>HEllO JEFFERSON</h1>
        <button class="next-btn" onclick="startSeizureChaos()">next</button>
    </div>

    <script>
        // 霓虹极光刺眼配色
        const neonColors = ['#ff0055', '#00ffcc', '#ffff00', '#ff00ff', '#00ff00', '#ff3300', '#ff00aa', '#0000ff'];

        function startSeizureChaos() {
            // 隐藏第一页
            document.getElementById('page1').classList.add('hidden');

            // 激活背景极速黑白闪烁 + 视网膜震动
            document.body.classList.add('crazy-flash');
            document.body.classList.add('screen-shake');

            // 铺满屏幕：直接生成 200 个文本
            const textCount = 200; 
            for (let i = 0; i < textCount; i++) {
                createLightningText();
            }
        }

        function createLightningText() {
            const el = document.createElement('div');
            el.className = 'chaotic-text';
            el.innerText = 'GET YOUR ASS UP！';
            
            // 超大字号，确保密不透风占满全屏
            const fontSize = Math.random() * (8 - 3) + 3; 
            el.style.fontSize = `${fontSize}rem`;
            el.style.color = neonColors[Math.floor(Math.random() * neonColors.length)];
            
            // 全屏幕随机出生点
            let posX = Math.random() * window.innerWidth;
            let posY = Math.random() * window.innerHeight;
            el.style.left = `${posX}px`;
            el.style.top = `${posY}px`;

            document.body.appendChild(el);

            // 光速级别的移动速度 (最大 120px/帧)
            let speedX = (Math.random() - 0.5) * 120; 
            let speedY = (Math.random() - 0.5) * 120; 
            let scale = Math.random() * 2;
            let scaleDirection = Math.random() > 0.5 ? 0.3 : -0.3; // 极速缩放
            let rotation = Math.random() * 360;
            let rotationSpeed = (Math.random() - 0.5) * 80; // 极速自转

            function animate() {
                posX += speedX;
                posY += speedY;
                scale += scaleDirection;
                rotation += rotationSpeed;

                // 越界反弹
                if (posX < -400 || posX > window.innerWidth + 400) speedX *= -1;
                if (posY < -100 || posY > window.innerHeight + 100) speedY *= -1;

                // 巨大化和缩小高频交替
                if (scale > 3.5 || scale < 0.2) scaleDirection *= -1;

                // 每帧有 15% 的极高概率瞬间改变轨迹和速度，达成闪烁乱窜效果
                if (Math.random() > 0.85) {
                    speedX = (Math.random() - 0.5) * 120;
                    speedY = (Math.random() - 0.5) * 120;
                    el.style.color = neonColors[Math.floor(Math.random() * neonColors.length)]; // 连文字颜色都在闪烁变色
                }

                // 应用超频矩阵形变
                el.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
                el.style.left = `${posX}px`;
                el.style.top = `${posY}px`;

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);
        }

        // 窗口大小改变自适应
        window.addEventListener('resize', () => {
            const elements = document.querySelectorAll('.chaotic-text');
            elements.forEach(el => {
                el.style.left = `${Math.random() * window.innerWidth}px`;
                el.style.top = `${Math.random() * window.innerHeight}px`;
            });
        });
    </script>
</body>
</html>
